android {
    namespace "com.sj.app"
    compileSdk 35
    defaultConfig {
        applicationId "com.sj.app"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }
    buildTypes {
        release { signingConfig signingConfigs.debug; minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
flutter { source '../..' }
